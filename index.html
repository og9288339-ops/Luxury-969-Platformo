    <style>
      #elite-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #050505;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s ease-out, visibility 0.8s;
      }
      
      #elite-preloader.is-loaded {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-bar-container {
        width: 200px;
        height: 2px;
        background: rgba(212, 175, 55, 0.1);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }

      .loader-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background-color: #D4AF37;
        box-shadow: 0 0 15px #D4AF37, 0 0 30px rgba(212, 175, 55, 0.5);
        animation: loading-glide 1.5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .loader-text {
        margin-top: 20px;
        color: #D4AF37;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 12px;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0.8;
      }

      @keyframes loading-glide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  
  <body>
    <div id="elite-preloader">
      <div class="loader-bar-container">
        <div class="loader-bar"></div>
      </div>
      <div class="loader-text">Initializing Secure Protocols</div>
    </div>

    <noscript>
      <div style="text-align: center; padding: 100px 20px; color: #fff; background: #050505; height: 100vh;">
        <h1 style="color: #d4af37;">Security Protocol Interrupted</h1>
        <p style="max-width: 600px; margin: 20px auto; color: #888;">This luxury marketplace requires JavaScript to initialize secure asset protocols.</p>
      </div>
    </noscript>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const preloader = document.getElementById('elite-preloader');
          if (preloader) {
            preloader.classList.add('is-loaded');
            setTimeout(() => preloader.remove(), 1000);
          }
        }, 500);
      });
    </script>
  </body>
